<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master India - Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #f1c40f;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f4f7f9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Quiz Card Style */
        .quiz-container {
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .progress-bar-wrap {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: 0.4s;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .timer {
            background: var(--error);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .question-text {
            font-size: 22px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .options-grid {
            display: grid;
            gap: 10px;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            background: none;
            cursor: pointer;
            text-align: left;
            font-size: 16px;
            transition: 0.3s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #f0f4ff;
        }

        /* Certificate Styles (Hidden initially) */
        #result-section { display: none; text-align: center; }

        .cert-wrapper {
            padding: 10px;
            background: #fff;
            margin-top: 20px;
        }

        .certificate {
            position: relative;
            border: 10px solid var(--primary);
            padding: 30px;
            background: white;
            color: var(--primary);
        }

        .cert-inner-border {
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 2px solid var(--accent);
        }

        .cert-title { font-weight: 800; font-size: 30px; margin: 0; }
        .user-name { font-size: 35px; color: #333; margin: 15px 0; text-decoration: underline; }

        .download-btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="quiz-section" class="quiz-container">
        <div class="progress-bar-wrap">
            <div id="progress"></div>
        </div>
        
        <div class="quiz-header">
            <span style="font-weight:bold; color:#666;">प्रश्न <span id="q-num">1</span>/5</span>
            <div class="timer" id="timer">15s</div>
        </div>

        <div class="question-text" id="question-text">Loading...</div>

        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="result-section" class="quiz-container">
        <h2>क्विज़ पूरा हुआ!</h2>
        <div id="certificate-container" class="cert-wrapper">
            <div class="certificate">
                <div class="cert-inner-border"></div>
                <h1 class="cert-title">QUIZ MASTER INDIA</h1>
                <p style="color:var(--accent); letter-spacing:3px;">HONORARY CERTIFICATE</p>
                <p>यह प्रमाणित किया जाता है कि आपने सफलतापूर्वक क्विज पूरा किया।</p>
                <h2 class="user-name">Winner</h2>
                <p>स्कोर: <span id="final-score">0</span>/5</p>
                <p>दिनांक: <span id="date"></span></p>
                <div style="margin-top:20px; font-style: italic;">Verified by QMI Team</div>
            </div>
        </div>
        <button class="download-btn" onclick="downloadCert()">सर्टिफिकेट सेव करें</button>
    </div>

    <script>
        const questions = [
            { q: "भारत के प्रथम प्रधानमंत्री कौन थे?", a: ["जवाहरलाल नेहरू", "महात्मा गांधी", "पटेल", "आजाद"], correct: 0 },
            { q: "शिक्षक दिवस किसकी जयंती पर मनाया जाता है?", a: ["गांधी", "नेहरू", "डॉ. राधाकृष्णन", "शास्त्री"], correct: 2 },
            // आप यहाँ और सवाल जोड़ सकते हैं
        ];

        let currentQ = 0;
        let score = 0;
        let timeLeft = 15;
        let timer;

        function startTimer() {
            timeLeft = 15;
            document.getElementById('timer').innerText = timeLeft + 's';
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + 's';
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    nextQuestion();
                }
            }, 1000);
        }

        function loadQuestion() {
            clearInterval(timer);
            startTimer();
            let q = questions[currentQ];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('q-num').innerText = currentQ + 1;
            document.getElementById('progress').style.width = ((currentQ + 1) / questions.length) * 100 + "%";
            
            let optionsHTML = "";
            q.a.forEach((opt, index) => {
                optionsHTML += `<button class="option-btn" onclick="handleAnswer(${index})">${opt}</button>`;
            });
            document.getElementById('options-container').innerHTML = optionsHTML;
        }

        function handleAnswer(index) {
            if(index === questions[currentQ].correct) score++;
            nextQuestion();
        }

        function nextQuestion() {
            currentQ++;
            if(currentQ < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            document.getElementById('date').innerText = new Date().toLocaleDateString();
        }

        function downloadCert() {
            const cert = document.getElementById('certificate-container');
            html2canvas(cert).then(canvas => {
                let link = document.createElement('a');
                link.download = 'QMI-Certificate.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        loadQuestion();
    </script>
</body>
</html>
